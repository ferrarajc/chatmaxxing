name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci --workspace agent-app

      - run: npm run build
        working-directory: agent-app
        env:
          VITE_API_URL: 'https://placeholder.example.com'
          VITE_AWS_REGION: 'us-east-1'
          VITE_CCP_URL: 'https://placeholder.example.com'

      - run: npm ci --workspace customer-app

      - run: npm run build
        working-directory: customer-app
        env:
          VITE_API_URL: 'https://placeholder.example.com'
          VITE_AWS_REGION: 'us-east-1'
          VITE_CONNECT_INSTANCE_URL: 'https://placeholder.example.com'
          VITE_DEMO_CODE: 'demo'
