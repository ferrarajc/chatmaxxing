name: Deploy Agent App

on:
  push:
    branches: [main]
    paths:
      - 'agent-app/**'
      - '.github/workflows/deploy-agent-app.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace agent-app

      - name: Build
        run: npm run build
        working-directory: agent-app
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_AWS_REGION: ${{ secrets.VITE_AWS_REGION }}
          VITE_CCP_URL: ${{ secrets.VITE_CCP_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: agent-app/dist
          destination_dir: agent
          keep_files: true   # keeps customer-app files at root
