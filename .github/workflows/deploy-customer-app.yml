name: Deploy Customer App

on:
  push:
    branches: [main]
    paths:
      - 'customer-app/**'
      - '.github/workflows/deploy-customer-app.yml'

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace customer-app

      - name: Build
        run: npm run build
        working-directory: customer-app
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_AWS_REGION: ${{ secrets.VITE_AWS_REGION }}
          VITE_CONNECT_INSTANCE_URL: ${{ secrets.VITE_CONNECT_INSTANCE_URL }}
          VITE_DEMO_CODE: ${{ secrets.VITE_DEMO_CODE }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: customer-app/dist
          destination_dir: .
          keep_files: true   # keeps agent-app files in agent/ subdirectory
